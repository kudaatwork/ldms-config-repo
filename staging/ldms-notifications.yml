server:
  port: 8094

spring:
  application:
    name: notifications
  datasource:
    url: jdbc:mysql://${DB_HOST:staging-db}:3306/ldms_notifications?useSSL=true&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: ${DB_USERNAME:${MYSQL_USER:developer}}
    password: ${DB_PASSWORD:${MYSQL_DEVELOPER_PASSWORD:Password098()!}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: false
ldms:
  notifications:
    rabbitmq:
      exchange: ldms.notifications.exchange
      queue: ldms.notifications.queue
      routing-key: notification.send

management:
  server:
    port: 9094
  tracing:
    sampling:
      probability: 0.1

logging:
  level:
    projectlx: INFO

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://staging-eureka:8761/eureka/}