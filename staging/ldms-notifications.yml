spring:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true
    properties:
      hibernate.jdbc.batch_size: 25
      hibernate.order_inserts: true
      hibernate.format_sql: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:developer}
    password: ${RABBITMQ_PASSWORD:Password098()!}
    virtual-host: /
    connection-timeout: 5000
    listener:
      simple:
        acknowledge-mode: auto
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000
          multiplier: 2.0
          max-interval: 10000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false
  servlet:
    multipart:
      max-file-size: 128MB
      max-request-size: 128MB
  application:
    name: ldms-notifications
  datasource:
    url: jdbc:mysql://localhost:3306/ldms_notifications?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: ${DB_USERNAME:${MYSQL_USER:developer}}
    password: ${DB_PASSWORD:${MYSQL_DEVELOPER_PASSWORD:Password098()!}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  cloud:
    aws:
      credentials:
        access-key: ${AWS_ACCESS_KEY_ID:}
        secret-key: ${AWS_SECRET_ACCESS_KEY:}
      region:
        static: ${AWS_REGION:eu-north-1}
      ses:
        enabled: ${SPRING_CLOUD_AWS_SES_ENABLED:true}
        region: ${AWS_REGION:eu-north-1}
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://${EUREKA_USERNAME:eureka}:${EUREKA_PASSWORD_ENCODED:Eureka098%28%29%21}@localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
    registry-fetch-interval-seconds: 30
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}
  server:
    port: 9094
  metrics:
    export:
      prometheus:
        enabled: true
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /v3/api-docs
feign:
  client:
    config:
      default:
        connect-timeout: 5000
        read-timeout: 10000
        logger-level: FULL
        connectTimeout: 5000
        readTimeout: 5000
        loggerLevel: full
  circuitbreaker:
    enabled: true
jwt:
  secret: ${JWT_SECRET:}
  access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
  refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}
ldms:
  audit:
    enabled: true
  audit-rabbitmq:
    exchange: ldms.audit.exchange
    routing-key: audit.log
audit:
  rabbitmq:
    exchange: exchange.audit.log
    routingkey: ${ldms.audit-rabbitmq.routing-key}
    routing-key: routing.audit.log
logging:
  pattern:
    console: '{"timestamp":"%d{yyyy-MM-dd HH:mm:ss.SSS}","level":"%level","service":"${spring.application.name}","traceId":"%X{traceId}","spanId":"%X{spanId}","thread":"%thread","logger":"%logger{36}","message":"%msg"}%n'
  level:
    root: INFO
    projectlx: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
server:
  port: 8094
notifications:
  rabbitmq:
    exchange: notifications.direct
    queue: notifications.queue
    routing-key: notifications.send
  providers:
    slack:
      webhook-url: ${SLACK_WEBHOOK_URL:}
    teams:
      webhook-url: ${TEAMS_WEBHOOK_URL:}
flyway:
  enabled: true
  locations: classpath:db/migration
twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:}
  auth-token: ${TWILIO_AUTH_TOKEN:}
  phone-number: ${TWILIO_PHONE_NUMBER:+13186186886}
  whatsapp:
    from-number: ${TWILIO_WHATSAPP_FROM:${TWILIO_WHATSAPP_FROM_NUMBER:+14155238886}}
    sandbox-mode: ${TWILIO_WHATSAPP_SANDBOX_MODE:true}

sendgrid:
  api-key: ${SENDGRID_API_KEY:}
  from-email: ${SENDGRID_FROM_EMAIL:${AWS_SES_FROM_EMAIL:info@xigencreative.co.zw}}

aws:
  ses:
    region: ${AWS_REGION:eu-north-1}
    from-email: ${AWS_SES_FROM_EMAIL:info@xigencreative.co.zw}
  credentials:
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}

firebase:
  service-account-file: ${FIREBASE_SERVICE_ACCOUNT_FILE:classpath:ldms-inapp-notifications-firebase-adminsdk-fbsvc-c44f468b67.json}
app:
  security:
    token:
      secret-key: ${TOKEN_SECRET_KEY:your-super-secret-signing-key-change-in-production-min-32-chars}
      length: ${TOKEN_LENGTH:32}
      expiration-hours: ${TOKEN_EXPIRATION_HOURS:24}
