server:
  port: 8088

spring:
  application:
    name: ldms-documents-management
  datasource:
    url: jdbc:mysql://localhost:3306/ldms_documents_management?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: ${DB_USERNAME:${MYSQL_USER:developer}}
    password: ${DB_PASSWORD:${MYSQL_DEVELOPER_PASSWORD:Password098()!}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: true

management:
  server:
    port: 9088

  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
ldms:
  file-service:
    base-url: http://localhost:8200
    internal-token: ${FILE_SERVICE_TOKEN}
    max-file-size-mb: 50
