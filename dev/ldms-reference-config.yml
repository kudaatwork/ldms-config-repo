server:
  port: 8085

spring:
  application:
    name: ldms-reference-config
  datasource:
    url: jdbc:mysql://localhost:3306/ldms_reference_config?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: ${DB_USERNAME:${MYSQL_USER:developer}}
    password: ${DB_PASSWORD:${MYSQL_DEVELOPER_PASSWORD:Password098()!}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: true
  cache:
    type: redis
    redis:
      time-to-live: 21600000   # 6 hours — reference data rarely changes

management:
  server:
    port: 9085
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
