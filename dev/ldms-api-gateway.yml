server:
  port: 8091

spring:
  application:
    name: ldms-api-gateway

  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  cloud:
    gateway:
      # CORS is owned ONLY here. Downstream services MUST NOT add @CrossOrigin or
      # WebMvcConfigurer-based CORS, otherwise duplicate Access-Control-Allow-Origin
      # headers are returned and the browser rejects every response.
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "http://localhost:[*]"
              - "http://127.0.0.1:[*]"
            allowedMethods:
              - GET
              - HEAD
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            exposedHeaders:
              - "X-User-Id"
              - "X-User-Roles"
            allowCredentials: true
            maxAge: 3600
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 2
            redis-rate-limiter.burstCapacity: 100
            key-resolver: "#{@ipKeyResolver}"
      # Route convention: Path=/<spring.application.name on downstream>/v1/<scope>/**
      # Scopes: frontend (JWT, role-protected), backoffice (JWT, role-protected),
      #         system (unauthenticated, internal/automation), auth (login/refresh).
      routes:
        - id: frontend-user
          uri: lb://user-management
          predicates:
            - Path=/ldms-user-management/v1/frontend/**
        - id: system-user
          uri: lb://user-management
          predicates:
            - Path=/ldms-user-management/v1/system/**
        - id: auth
          uri: lb://auth-management
          predicates:
            - Path=/ldms-authentication/v1/auth/**
        - id: frontend-organization
          uri: lb://organization-management-service
          predicates:
            - Path=/ldms-organization-management/v1/frontend/**
        - id: system-organization
          uri: lb://organization-management-service
          predicates:
            - Path=/ldms-organization-management/v1/system/**
        - id: frontend-notifications
          uri: lb://notifications
          predicates:
            - Path=/ldms-notifications/v1/frontend/**
        - id: system-notifications
          uri: lb://notifications
          predicates:
            - Path=/ldms-notifications/v1/system/**
        - id: frontend-audit-trail
          uri: lb://ldms-audit-trail
          predicates:
            - Path=/ldms-audit-trail/v1/frontend/**
        - id: backend-audit-trail
          uri: lb://ldms-audit-trail
          predicates:
            - Path=/ldms-audit-trail/v1/backend/**
        - id: system-audit-trail
          uri: lb://ldms-audit-trail
          predicates:
            - Path=/ldms-audit-trail/v1/system/**
        - id: frontend-file-upload
          uri: lb://ldms-file-upload-service
          predicates:
            - Path=/ldms-file-upload-service/v1/frontend/**
        - id: backoffice-file-upload
          uri: lb://ldms-file-upload-service
          predicates:
            - Path=/ldms-file-upload-service/v1/backoffice/**
        - id: system-file-upload
          uri: lb://ldms-file-upload-service
          predicates:
            - Path=/ldms-file-upload-service/v1/system/**
        - id: frontend-locations
          uri: lb://ldms-location-management
          predicates:
            - Path=/ldms-locations/v1/frontend/**
        - id: system-locations
          uri: lb://ldms-location-management
          predicates:
            - Path=/ldms-locations/v1/system/**

eureka:
  client:
    service-url:
      defaultZone: http://eureka:Eureka098%28%29%21@localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
    eureka-server-connect-timeout-seconds: 5
    eureka-server-read-timeout-seconds: 8
    registry-fetch-interval-seconds: 30
    instance-info-replication-interval-seconds: 30
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 30

gateway:
  jwt:
    secret: ${JWT_SECRET:ldms-dev-gateway-jwt-secret-change-me-in-production-min-32-chars}
    roles-claim: roles

management:
  server:
    port: 9080
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

  metrics:
    export:
      prometheus:
        enabled: true
logging:
  level:
    org.springframework.cloud.gateway: INFO
    projectlx.co.zw.apigateway: INFO
    io.netty.resolver.dns.DnsServerAddressStreamProviders: WARN
    com.netflix.discovery.TimedSupervisorTask: ERROR
    com.netflix.discovery.shared.resolver.aws.ConfigClusterResolver: WARN
    com.netflix.discovery.shared.transport.decorator.RetryableEurekaHttpClient: WARN
    com.netflix.discovery.shared.transport.decorator.RedirectingEurekaHttpClient: WARN
