server:
  port: 8001

spring:
  application:
    name: ldms-scheduler
  # No datasource — scheduler is stateless
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: false

management:
  server:
    port: 9001

  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
ldms:
  scheduler:
    overdue-invoices-cron: "0 0 1 * * *"
    compliance-check-cron: "0 0 6 * * *"
    kyc-sla-cron: "0 */30 * * * *"
    monthly-report-cron: "0 0 2 1 * *"

clients:
  base-url:
    billing-payments: http://ldms-billing-payments
    fleet-management: http://ldms-fleet-management
    organization-management: http://ldms-organization-management
