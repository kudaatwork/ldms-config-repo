server:
  port: 8096

spring:
  application:
    name: ldms-platform-admin
  datasource:
    url: jdbc:mysql://localhost:3306/ldms_platform_admin?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: ${DB_USERNAME:${MYSQL_USER:developer}}
    password: ${DB_PASSWORD:${MYSQL_DEVELOPER_PASSWORD:Password098()!}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: true

management:
  server:
    port: 9096

  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
clients:
  base-url:
    organization-management: http://ldms-organization-management
    user-management: http://ldms-user-management
