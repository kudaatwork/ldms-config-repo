server:
  port: 8084

spring:
  application:
    name: ldms-location-management
  datasource:
    url: jdbc:mysql://localhost:3306/ldms_location_management?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: ${DB_USERNAME:${MYSQL_USER:developer}}
    password: ${DB_PASSWORD:${MYSQL_DEVELOPER_PASSWORD:Password098()!}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: true

management:
  server:
    port: 9084
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

eureka:
  instance:
    # Force localhost registration in local dev so gateway can resolve and reach
    # this service even when VPN/virtual NICs expose non-routable 10.x addresses.
    prefer-ip-address: false
    hostname: localhost
    instance-id: ${eureka.instance.hostname}:${spring.application.name}:${server.port}
