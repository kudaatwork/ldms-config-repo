# ldms-location-management — dev (Spring Cloud Config).
# Docker Compose: spring.docker.compose.file is set at app startup (LdmsInfrastructureComposeLocator).
# Stack: ldms-platform/infrastructure/docker-compose.yml — start.arguments bring up mysql + rabbitmq only.

server:
  port: ${SERVER_PORT:8084}

spring:
  application:
    name: ldms-location-management
  docker:
    compose:
      enabled: ${SPRING_DOCKER_COMPOSE_ENABLED:true}
      lifecycle-management: start-only
      start:
        arguments:
          - mysql
          - rabbitmq
  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/ldms_location_management?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true&connectTimeout=10000&socketTimeout=45000
    username: ${DB_USERNAME:${MYSQL_USER:developer}}
    password: ${DB_PASSWORD:${MYSQL_DEVELOPER_PASSWORD:Password098()!}}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${DATASOURCE_POOL_MAX:20}
      minimum-idle: ${DATASOURCE_POOL_MIN:5}
      idle-timeout: ${HIKARI_IDLE_TIMEOUT_MS:30000}
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT_MS:20000}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:true}
  rabbitmq:
    host: ${RABBITMQ_HOST:127.0.0.1}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:${RABBITMQ_DEFAULT_USER:developer}}
    password: ${RABBITMQ_PASSWORD:${RABBITMQ_DEFAULT_PASS:Password098()!}}

management:
  server:
    port: ${MANAGEMENT_SERVER_PORT:9084}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}

logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
    projectlx: ${LOGGING_LEVEL_PROJECTLX:INFO}

jwt:
  secret: ${JWT_SECRET:dev-secret-must-be-at-least-256-bits-for-hs256-xxxxxxxxxxxxxxxx}
  access-token-expiration-ms: ${JWT_ACCESS_MS:3600000}
  refresh-token-expiration-ms: ${JWT_REFRESH_MS:86400000}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://eureka:Eureka098%28%29%21@localhost:8761/eureka/}
    register-with-eureka: ${EUREKA_REGISTER_WITH_EUREKA:true}
    fetch-registry: ${EUREKA_FETCH_REGISTRY:true}
    eureka-server-connect-timeout-seconds: ${EUREKA_SERVER_CONNECT_TIMEOUT_SECONDS:5}
    eureka-server-read-timeout-seconds: ${EUREKA_SERVER_READ_TIMEOUT_SECONDS:8}
  instance:
    prefer-ip-address: ${EUREKA_PREFER_IP_ADDRESS:false}
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
    instance-id: ${EUREKA_INSTANCE_ID:${eureka.instance.hostname}:${spring.application.name}:${server.port}}
