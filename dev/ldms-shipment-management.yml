server:
  port: 8087

spring:
  application:
    name: ldms-shipment-management
  datasource:
    url: jdbc:mysql://localhost:3306/ldms_shipment_management?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: ${DB_USERNAME:${MYSQL_USER:developer}}
    password: ${DB_PASSWORD:${MYSQL_DEVELOPER_PASSWORD:Password098()!}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: true

management:
  server:
    port: 9087

  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
clients:
  base-url:
    inventory-management: http://ldms-inventory-management
    documents-management: http://ldms-documents-management
    billing-payments: http://ldms-billing-payments
