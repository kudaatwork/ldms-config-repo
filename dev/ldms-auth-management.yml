server:
  port: 8083

spring:
  application:
    name: auth-management
  datasource:
    url: jdbc:mysql://localhost:3306/ldms_auth_management?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: ${DB_USERNAME:${MYSQL_USER:developer}}
    password: ${DB_PASSWORD:${MYSQL_DEVELOPER_PASSWORD:Password098()!}}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 3
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

management:
  server:
    port: 9083

  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
clients:
  base-url:
    userManagementService: http://user-management:${USER_MANAGEMENT_SERVER_PORT:8081}

ldms:
  auth:
    otp-expiry-minutes: 5
    max-otp-attempts: 3
