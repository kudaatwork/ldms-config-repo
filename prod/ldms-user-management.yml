server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: user-management
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/ldms_user_management?useSSL=true&requireSSL=true&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: ${DB_USERNAME:${MYSQL_USER:developer}}
    password: ${DB_PASSWORD:${MYSQL_DEVELOPER_PASSWORD:Password098()!}}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      idle-timeout: 600000
      connection-timeout: 30000
  jpa:
    show-sql: false
  cache:
    type: redis
    redis:
      time-to-live: 1800000
ldms:
  audit:
    enabled: true
  user:
    password:
      expiry-days: 90
      history-count: 5
      min-length: 8
      require-uppercase: true
      require-digit: true
      require-special: true
    account:
      max-failed-attempts: 5
      lock-duration-minutes: 30

clients:
  base-url:
    locationService: http://ldms-location-management:${LOCATION_MANAGEMENT_SERVER_PORT:8084}
    fileUploadService: http://ldms-documents-management:${DOCUMENTS_MANAGEMENT_SERVER_PORT:8080}

management:
  server:
    port: ${MANAGEMENT_SERVER_PORT:9081}
  tracing:
    sampling:
      probability: 0.05

logging:
  level:
    root: WARN
    projectlx: INFO

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL}

constants:
  max-image-size: ${CONSTANTS_MAX_IMAGE_SIZE:2048KB}