server:
  port: 8089

spring:
  application:
    name: ldms-fleet-management
  datasource:
    url: jdbc:mysql://${DB_HOST}:3306/ldms_fleet_management?useSSL=true&requireSSL=true&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: ${DB_USERNAME:${MYSQL_USER:developer}}
    password: ${DB_PASSWORD:${MYSQL_DEVELOPER_PASSWORD:Password098()!}}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      idle-timeout: 600000
      connection-timeout: 30000
  jpa:
    show-sql: false
clients:
  base-url:
    documents-management: http://ldms-documents-management
    user-management: http://ldms-user-management

ldms:
  fleet:
    compliance-warning-days: 30

management:
  server:
    port: 9089
  tracing:
    sampling:
      probability: 0.05

logging:
  level:
    root: WARN
    projectlx: INFO

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL}