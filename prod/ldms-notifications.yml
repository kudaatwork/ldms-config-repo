server:
  port: 8094

spring:
  application:
    name: notifications
  datasource:
    url: jdbc:mysql://${DB_HOST}:3306/ldms_notifications?useSSL=true&requireSSL=true&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: ${DB_USERNAME:${MYSQL_USER:developer}}
    password: ${DB_PASSWORD:${MYSQL_DEVELOPER_PASSWORD:Password098()!}}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      idle-timeout: 600000
      connection-timeout: 30000
  jpa:
    show-sql: false
ldms:
  notifications:
    rabbitmq:
      exchange: ldms.notifications.exchange
      queue: ldms.notifications.queue
      routing-key: notification.send

management:
  server:
    port: 9094
  tracing:
    sampling:
      probability: 0.05

logging:
  level:
    root: WARN
    projectlx: INFO

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL}