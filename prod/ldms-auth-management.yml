server:
  port: 8083

spring:
  application:
    name: auth-management
  datasource:
    url: jdbc:mysql://${DB_HOST}:3306/ldms_auth_management?useSSL=true&requireSSL=true&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: ${DB_USERNAME:${MYSQL_USER:developer}}
    password: ${DB_PASSWORD:${MYSQL_DEVELOPER_PASSWORD:Password098()!}}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      idle-timeout: 600000
      connection-timeout: 30000
  jpa:
    show-sql: false
clients:
  base-url:
    userManagementService: http://user-management:${USER_MANAGEMENT_SERVER_PORT:8081}

ldms:
  auth:
    otp-expiry-minutes: 5
    max-otp-attempts: 3
    google:
      enabled: ${GOOGLE_OAUTH_ENABLED:false}
      client-id: ${GOOGLE_CLIENT_ID:}

management:
  server:
    port: 9083
  tracing:
    sampling:
      probability: 0.05

logging:
  level:
    root: WARN
    projectlx: INFO

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL}