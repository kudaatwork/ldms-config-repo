# ldms-location-management — production (Spring Cloud Config).
# Docker Compose is disabled; use managed MySQL / RabbitMQ via env.

server:
  port: 8084

spring:
  application:
    name: ldms-location-management
  docker:
    compose:
      enabled: false
  datasource:
    url: jdbc:mysql://${DB_HOST}:3306/ldms_location_management?useSSL=true&requireSSL=true&serverTimezone=UTC&connectTimeout=15000&socketTimeout=45000
    username: ${DB_USERNAME:${MYSQL_USER:developer}}
    password: ${DB_PASSWORD:${MYSQL_DEVELOPER_PASSWORD:Password098()!}}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      idle-timeout: 600000
      connection-timeout: 30000
  jpa:
    show-sql: false
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}

management:
  server:
    port: 9084
  tracing:
    sampling:
      probability: 0.05

logging:
  level:
    root: WARN
    projectlx: INFO

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration-ms: ${JWT_ACCESS_MS:3600000}
  refresh-token-expiration-ms: ${JWT_REFRESH_MS:86400000}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL}
