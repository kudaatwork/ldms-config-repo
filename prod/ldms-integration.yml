spring:
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: false
    properties:
      hibernate.jdbc.batch_size: 25
      hibernate.order_inserts: true
      hibernate.format_sql: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:developer}
    password: ${RABBITMQ_PASSWORD:Password098()!}
    virtual-host: /
    connection-timeout: 5000
    listener:
      simple:
        acknowledge-mode: auto
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000
          multiplier: 2.0
          max-interval: 10000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2
  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false
  servlet:
    multipart:
      max-file-size: 128MB
      max-request-size: 128MB
  application:
    name: ldms-integration
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL}
    register-with-eureka: true
    fetch-registry: true
    registry-fetch-interval-seconds: 30
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,loggers,flyway
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 0.05
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}
  server:
    port: 9097
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /v3/api-docs
feign:
  client:
    config:
      default:
        connect-timeout: 5000
        read-timeout: 10000
        logger-level: FULL
  circuitbreaker:
    enabled: true
jwt:
  secret: ${JWT_SECRET:dev-jwt-secret-change-me-please-override}
  access-token-expiration-ms: 900000
  refresh-token-expiration-ms: 604800000
ldms:
  audit:
    enabled: true
  audit-rabbitmq:
    exchange: ldms.audit.exchange
    routing-key: audit.log
audit:
  rabbitmq:
    exchange: ${ldms.audit-rabbitmq.exchange}
    routingkey: ${ldms.audit-rabbitmq.routing-key}
logging:
  pattern:
    console: '{"timestamp":"%d{yyyy-MM-dd HH:mm:ss.SSS}","level":"%level","service":"${spring.application.name}","traceId":"%X{traceId}","spanId":"%X{spanId}","thread":"%thread","logger":"%logger{36}","message":"%msg"}%n'
  level:
    root: WARN
    projectlx: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
server:
  port: 8097
twilio:
  account-sid: ${TWILIO_ACCOUNT_SID}
  auth-token: ${TWILIO_AUTH_TOKEN}
  sms-from: ${TWILIO_PHONE_NUMBER}
  whatsapp-from: ${TWILIO_WHATSAPP_FROM}
sendgrid:
  api-key: ${SENDGRID_API_KEY}
  from-email: ${SENDGRID_FROM_EMAIL}
firebase:
  server-key: ${FIREBASE_SERVER_KEY}
  service-account-file: classpath:firebase-adminsdk.json
aws:
  region: ${AWS_REGION}
  ses:
    from-email: ${AWS_SES_FROM_EMAIL}
  credentials:
    access-key: ${AWS_ACCESS_KEY_ID}
    secret-key: ${AWS_SECRET_ACCESS_KEY}
mqtt:
  broker-url: tcp://${MQTT_HOST}:1883
  client-id: ldms-integration-${random.int}
  username: ${MQTT_USERNAME}
  password: ${MQTT_PASSWORD}
